    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initChaptersPage();
        });
        
        function initChaptersPage() {
            const container = document.getElementById('chaptersContainer');
            const navBtns = document.querySelectorAll('.chapter-nav-btn');
            
            renderChapter('shed');
            
            navBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    navBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderChapter(btn.dataset.chapter);
                });
            });
            
            const hash = window.location.hash.slice(1);
            if (hash && gameData.chapters.find(c => c.id === hash)) {
                navBtns.forEach(b => {
                    b.classList.toggle('active', b.dataset.chapter === hash);
                });
                renderChapter(hash);
            }
        }
        
        function renderChapter(chapterId) {
            const container = document.getElementById('chaptersContainer');
            const chapter = gameData.chapters.find(c => c.id === chapterId);
            if (!chapter) return;
            
            const chapterEmojis = {
                shed: '🔨',
                tree: '🌲',
                rose: '🌹',
                clock: '🕐',
                snowglobe: '❄️',
                garden: '🌻',
                attic: '🎵'
            };
            
            container.innerHTML = `
                <div class="chapter-detail">
                    <div class="chapter-detail-header" style="background: linear-gradient(135deg, ${chapter.color}30, ${chapter.color}10);">
                        <span class="chapter-badge">第${chapter.number}章</span>
                        <h2>${chapterEmojis[chapter.id]} ${chapter.name}</h2>
                        <p class="chapter-theme-tag">${chapter.theme}</p>
                    </div>
                    
                    <div class="chapter-detail-body">
                        <div class="chapter-stats-row">
                            <div class="chapter-stat-card">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M12 6v6l4 2"></path>
                                </svg>
                                <span class="stat-label">⏱️ 游戏时长</span>
                                <span class="stat-value">${chapter.duration}</span>
                            </div>
                            <div class="chapter-stat-card">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                                </svg>
                                <span class="stat-label">🎯 核心技能</span>
                                <span class="stat-value">${chapter.mechanics.join(' + ')}</span>
                            </div>
                            <div class="chapter-stat-card">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="2" y="6" width="20" height="12" rx="2"></rect>
                                    <circle cx="8" cy="12" r="2"></circle>
                                </svg>
                                <span class="stat-label">🎮 小游戏</span>
                                <span class="stat-value">${chapter.minigames}个</span>
                            </div>
                        </div>
                        
                        <div class="chapter-intro">
                            <h3>📝 章节简介</h3>
                            <p>${chapter.desc}</p>
                        </div>
                        
                        <div class="chapter-sections">
                            <h3>📍 关卡列表</h3>
                            <div class="sections-grid">
                                ${chapter.sections.map((section, i) => `
                                    <div class="section-card">
                                        <span class="section-num">${i + 1}</span>
                                        <div class="section-content">
                                            <h4>${section.name}</h4>
                                            <p>${section.desc}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        ${chapter.boss ? `
                            <div class="chapter-boss-section">
                                <h3>⚔️ 本章Boss</h3>
                                <div class="boss-mini-card">
                                    <div class="boss-mini-icon">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                                            <path d="M2 17l10 5 10-5M2 12l10 5 10-5"></path>
                                        </svg>
                                    </div>
                                    <div class="boss-mini-info">
                                        <h4>${chapter.boss.name}</h4>
                                        <p>${chapter.boss.desc}</p>
                                    </div>
                                    <a href="bosses.html" class="btn btn-secondary btn-sm">查看详细打法 ⚔️</a>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }
    </script>
