    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderMinigames('all');
            initFilter();
        });
        
        function renderMinigames(chapter) {
            const grid = document.getElementById('minigamesGrid');
            const filtered = chapter === 'all' 
                ? gameData.minigames 
                : gameData.minigames.filter(m => m.chapter === chapter);
            
            grid.innerHTML = filtered.map(minigame => `
                <div class="minigame-card">
                    <div class="minigame-header">
                        <span class="minigame-number">#${minigame.id}</span>
                        <h3>🎮 ${minigame.name}</h3>
                    </div>
                    <div class="minigame-info">
                        <p><strong>📍 位置：</strong>${minigame.chapter} - ${minigame.section}</p>
                        <p><strong>🎯 玩法：</strong>${minigame.desc}</p>
                        <p><strong>💡 技巧：</strong>${minigame.tips}</p>
                    </div>
                </div>
            `).join('');
        }
        
        function initFilter() {
            const btns = document.querySelectorAll('.chapter-filter-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderMinigames(btn.dataset.chapter);
                });
            });
        }
    </script>
